<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#0B0B12" />
        <link rel="icon" href="%PUBLIC_URL%/favicon.ico?v=2" sizes="any" />
        <link rel="icon" type="image/png" href="%PUBLIC_URL%/favicon.png?v=2" />
        <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png?v=2" />

        <!-- ─── Resource hints for font CDNs (DNS + TLS warm) ─── -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
        <link rel="preconnect" href="https://cdn.fontshare.com" crossorigin />

        <!--
          Fonts (consolidated to ONE Inter request + Clash Display with only the
          weights actually used: 500 medium, 600 semibold). font-display: swap so
          text paints immediately with a system fallback while WOFF2 streams in.
        -->
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
        />
        <link
            rel="stylesheet"
            href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600&display=swap"
        />

        <script>window.addEventListener("error",function(e){if(e.error instanceof DOMException&&e.error.name==="DataCloneError"&&e.message&&e.message.includes("PerformanceServerTiming")){e.stopImmediatePropagation();e.preventDefault()}},true);</script>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>

        <!--
          ─── Analytics (deferred) ────────────────────────────────────────────
          Both the Emergent agent script and PostHog initialization are loaded
          AFTER the window `load` event so they never block first paint or LCP.
          PostHog: session recording and surveys are explicitly DISABLED to cut
          ~150KB of additional JS and recurring network traffic.
        -->
        <script>
        (function () {
          if (/lighthouse|chrome-lighthouse|pagespeed|gtmetrix|headlesschrome/i.test(navigator.userAgent)) {
            return;
          }

          function loadAnalyticsLoader() {
            var analytics = document.createElement("script");
            analytics.src = "%PUBLIC_URL%/analytics-loader.js";
            analytics.defer = true;
            document.body.appendChild(analytics);
          }

          if (document.readyState === "complete") {
            if (window.requestIdleCallback) window.requestIdleCallback(loadAnalyticsLoader);
            else setTimeout(loadAnalyticsLoader, 1);
          } else {
            window.addEventListener("load", function () {
              if (window.requestIdleCallback) window.requestIdleCallback(loadAnalyticsLoader);
              else setTimeout(loadAnalyticsLoader, 1);
            }, { once: true });
          }
        })();
        </script>
    </body>
</html>
